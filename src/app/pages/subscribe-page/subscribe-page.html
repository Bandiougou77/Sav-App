<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-success text-white text-center">
          <h4>Inscription SavApp</h4>
        </div>
        <div class="card-body">
          @if (errorMessage) {
            <div class="alert alert-danger p-2 small">
              {{ errorMessage }}
            </div>
          }
          @if (successMessage) {
            <div class="alert alert-success p-2 small">
              {{ successMessage }}
            </div>
          }

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Nom d'utilisateur *</label>
              <input type="text" name="username" class="form-control"
                [(ngModel)]="userData.username" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email *</label>
              <input type="email" name="email" class="form-control"
                [(ngModel)]="userData.email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Mot de passe *</label>
              <input type="password" name="password" class="form-control"
                [(ngModel)]="userData.password" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirmer le mot de passe *</label>
              <input type="password" name="confirmPassword" class="form-control"
                [(ngModel)]="userData.confirmPassword" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Rôle</label>
              <select name="role" class="form-control" [(ngModel)]="userData.role">
                <option value="USER">Utilisateur</option>
                <option value="ADMIN">Administrateur</option>
              </select>
            </div>

            <button type="submit" class="btn btn-success w-100" [disabled]="isLoading">
              @if (isLoading) {
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                Inscription en cours...
              } @else {
                S'inscrire
              }
            </button>
          </form>
        </div>
        <div class="card-footer text-center small">
          Déjà un compte ? <a href="/login">Se connecter</a>
        </div>
      </div>
    </div>
  </div>
</div>
