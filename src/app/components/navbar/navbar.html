<nav class="nav-bar-fluid container-fluid navbar navbar-expand-sm p-0 mb-4">
  <div class="container-xl nav-bar-content p-0">
    <button class="navbar-toggler ms-3 mt-2 mb-2"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav nav-underline">

        <!-- Accès à la page home -->
        <li class="nav-item border-0">
          <a class="nav-link" routerLink="home" routerLinkActive="active"
            title="Retour à la page d'accueil">
            <i class="bi bi-house-fill"></i>
          </a>
        </li>

        <!-- Calculateur (toujours visible) -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/recipe-calculator" routerLinkActive="active"
            title="Calculer une recette de savon">
            <i class="bi bi-calculator-fill"></i> Calculateur
          </a>
        </li>

        <!-- Mes recettes (connecté seulement) -->
        @if (authService.isAuthenticated()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/recipe-manager" routerLinkActive="active"
              title="Gérer mes recettes">
              <i class="bi bi-journal-text"></i> Mes recettes
            </a>
          </li>
        }

        <!-- Admin seulement -->
        @if (authService.hasRole('ROLE_ADMIN')) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/users-manager" routerLinkActive="active"
              title="Gérer les utilisateurs">
              <i class="bi bi-people-fill"></i> Utilisateurs
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/ingredients-manager" routerLinkActive="active"
              title="Gérer les ingrédients">
              <i class="bi bi-collection-fill"></i> Ingrédients
            </a>
          </li>
        }

        <!-- Connexion si pas connecté -->
        @if (!authService.isAuthenticated()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">
              <i class="bi bi-box-arrow-in-right"></i> Connexion
            </a>
          </li>

      </ul>
    </div>
